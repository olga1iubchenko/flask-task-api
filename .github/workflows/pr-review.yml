name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    # Skip draft PRs to avoid wasted token spend
    # (handled below with the if condition)

jobs:
  review:
    # Don't review draft PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write   # to post review comments
      contents: read         # read-only — Claude won't modify code here
      id-token: write        # gives the workflow permission to request an OIDC (OpenID Connect) token from GitHube

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Review the changes in this PR against CLAUDE.md rules.
            PR NUMBER: ${{ github.event.pull_request.number }}
            REPO: ${{ github.repository }}

            You MUST flag the following as HIGH PRIORITY issues if present:
            1. Any POST or PUT route where title can be an empty string "" without returning HTTP 400
            2. Any route that calls request.get_json() without checking if the result is None
            3. Any missing HTTP 400 response for invalid or missing required fields

            Do NOT say checks passed if any of the above are present in the diff.
            Be explicit — quote the exact line that violates each rule.

          # Read-only: Claude reviews but does not push changes
          claude_args: --model claude-sonnet-4-6 --allowedTools Read,Grep,Glob,Bash
