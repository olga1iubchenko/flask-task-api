name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only run when @claude is mentioned
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest

    permissions:
      contents: write        # so Claude can push commits
      pull-requests: write   # so Claude can post PR comments
      issues: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so Claude can understand context

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # CLAUDE.md is read automatically — no extra config needed
